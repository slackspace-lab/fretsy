[project]
name = "fretsy"
dynamic = ["version"]
description = "A pure-Python library for generating guitar chord diagram images (SVG and PNG)"
authors = [{ name = "JP Copeland", email = "jp@slackspace.com" }]
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
keywords = ["guitar", "chord", "diagram", "svg", "png", "music"]
dependencies = []

[project.optional-dependencies]
png = [
    "cairosvg",
    "pillow",
]

[project.urls]
Homepage = "https://github.com/slackspace-lab/fretsy"
Repository = "https://github.com/slackspace-lab/fretsy"

[project.scripts]
fretsy = "fretsy.__main__:main"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.hooks.vcs]
version-file = "src/fretsy/_version.py"

[dependency-groups]
dev = [
    "pyrefly>=0.62.0",
    "pytest>=9.0.3",
    "ruff>=0.15.12",
]

[tool.ruff]
target-version = "py310"
src = ["src"]
line-length = 100

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]

[tool.ruff.lint.per-file-ignores]
"src/fretsy/_library.py" = ["E501"]   # data file — long chord definitions are fine
"src/fretsy/_version.py" = ["RUF022"] # auto-generated by hatch-vcs

[tool.ruff.format]
quote-style = "double"

[tool.pyrefly]
project_includes = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
